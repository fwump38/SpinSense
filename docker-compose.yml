version: '3.8'

services:
  spinsense:
    image: ghcr.io/fwump38/spinsense:latest
    
    container_name: spinsense
    restart: unless-stopped
    
    # Audio device passthrough (required for USB audio input)
    devices:
      - "/dev/snd:/dev/snd"
    
    # Add to audio group to access sound devices
    group_add:
      - "29"
    
    # Use host IPC for ALSA audio (required for sound access)
    ipc: host
    
    # Use host network for MQTT communication
    network_mode: host
    
    # Mount configuration and temporary files
    volumes:
      - ./config.json:/app/config.json
      - /tmp:/tmp
    
    # Environment variables for configuration
    environment:
      - MQTT_HOST=${MQTT_HOST:-192.168.1.100}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER:-spinsense}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_DISCOVERY_TOPIC=${MQTT_DISCOVERY_TOPIC:-homeassistant/media_player/spin_sense/config}
      - AUDIO_DEVICE=${AUDIO_DEVICE:-}
      - AUDIO_THRESHOLD=${AUDIO_THRESHOLD:-0.015}
      - AUDIO_SAMPLE_LENGTH=${AUDIO_SAMPLE_LENGTH:-5.0}
      - AUDIO_SAMPLE_RATE=${AUDIO_SAMPLE_RATE:-48000}
      - SILENCE_INTERVAL=${SILENCE_INTERVAL:-5.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
