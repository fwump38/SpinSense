name: Build songrec Base Image

on:
    workflow_dispatch:
    push:
        paths:
            - "docker/Dockerfile"
        branches:
            - main

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-songrec:
        strategy:
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                      tag_suffix: amd64
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm
                      tag_suffix: arm64
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read
            packages: write

        steps:
            - name: Lowercase image name
              run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV
              env:
                  IMAGE_NAME: ${{ env.IMAGE_NAME }}

            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push songrec builder image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./docker/Dockerfile
                  target: songrec-builder
                  platforms: ${{ matrix.platform }}
                  push: true
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/songrec-builder:latest-${{ matrix.tag_suffix }}
                  cache-from: type=gha,scope=songrec-${{ matrix.tag_suffix }}
                  cache-to: type=gha,scope=songrec-${{ matrix.tag_suffix }},mode=max

    merge-manifest:
        needs: build-songrec
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Lowercase image name
              run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV
              env:
                  IMAGE_NAME: ${{ env.IMAGE_NAME }}

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Create and push multi-arch manifest
              run: |
                  docker manifest create \
                    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/songrec-builder:latest \
                    --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/songrec-builder:latest-amd64 \
                    --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/songrec-builder:latest-arm64
                  docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/songrec-builder:latest
