name: Build and Push Docker Image

on:
  push:
    tags: ["v*.*.*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if relevant files changed since last tag
        id: check
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, triggering build"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only "$PREV_TAG" "${{ github.ref_name }}" -- \
              requirements.txt \
              core/ \
              gui/ \
              core_engine.py \
              docker/ \
              .github/workflows/docker.yml)
            if [ -n "$CHANGED" ]; then
              echo "Relevant files changed since $PREV_TAG"
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "No relevant files changed since $PREV_TAG, skipping build"
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  build-and-push:
    needs: check-changes
    if: needs.check-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PYTHON_BASE=python:3.11-slim-trixie
          cache-from: type=gha
          cache-to: type=gha,mode=max
