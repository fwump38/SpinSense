name: Release

on:
    push:
        tags: ["v*.*.*"]

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check for relevant changes
              id: changes
              run: |
                  PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
                  if [ -z "$PREV_TAG" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                  else
                    CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- custom_components/ hacs.json)
                    if [ -n "$CHANGED" ]; then
                      echo "changed=true" >> $GITHUB_OUTPUT
                    else
                      echo "changed=false" >> $GITHUB_OUTPUT
                    fi
                  fi

            - name: Update manifest version
              if: steps.changes.outputs.changed == 'true'
              run: |
                  VERSION=${GITHUB_REF_NAME#v}
                  jq --arg v "$VERSION" '.version = $v' custom_components/spinsense/manifest.json > tmp.json
                  mv tmp.json custom_components/spinsense/manifest.json

            - name: Create zip
              if: steps.changes.outputs.changed == 'true'
              run: |
                  cd custom_components
                  zip -r ../spinsense.zip spinsense/

            - name: Create release and upload zip
              if: steps.changes.outputs.changed == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  files: spinsense.zip
