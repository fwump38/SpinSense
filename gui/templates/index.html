<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpinSense Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <h1>SpinSense Control Panel</h1>
        <div class="engine-controls">
            <span id="engine-status-badge" class="badge stopped">Engine: Stopped</span>
        </div>
    </header>

    <main>
        <section class="card live-status">
            <h2>Live Playback</h2>
            
            <div class="volume-container">
                <label>Audio Input Level (RMS)</label>
                <div class="meter-bg">
                    <div id="volume-bar" class="meter-fill"></div>
                </div>
                <span id="volume-text">0.000</span>
            </div>

            <div class="now-playing">
                <img id="album-art" src="/static/placeholder.jpg" alt="Album Art">
                <div class="track-info">
                    <h3 id="track-title">Waiting for drop...</h3>
                    <p id="track-artist">Artist</p>
                    <p id="track-album">Album</p>
                </div>
            </div>
        </section>

        <section class="card config-section">
            <div class="config-header">
                <h2>Configuration</h2>
            </div>
            
            <div class="grid-form">
                <fieldset>
                    <legend>Hardware</legend>
                    <label>Audio Input Device</label>
                    <span id="cfg-device" class="config-value">—</span>
                </fieldset>

                <fieldset>
                    <legend>Audio Engine</legend>
                    <label>Volume Threshold</label>
                    <span id="cfg-threshold" class="config-value">—</span>

                    <label>Sample Length (sec)</label>
                    <span id="cfg-sample-len" class="config-value">—</span>

                    <label>Sample Rate (Hz)</label>
                    <span id="cfg-sample-rate" class="config-value">—</span>

                    <label>Silence Interval (sec)</label>
                    <span id="cfg-silence-interval" class="config-value">—</span>
                </fieldset>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
